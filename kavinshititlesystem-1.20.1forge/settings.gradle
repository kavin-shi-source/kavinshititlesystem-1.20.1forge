pluginManagement {
    repositories {
        gradlePluginPortal()
        maven { url = 'https://maven.minecraftforge.net/' }
    }
}

rootProject.name = 'kavinshis-playertitle'

// 定义子模块
include 'titlesystem-common'
include 'titlesystem-server'
include 'titlesystem-client'
include 'velocity-bridge'

// 设置模块项目目录
project(':titlesystem-common').projectDir = file('titlesystem-common')
project(':titlesystem-server').projectDir = file('titlesystem-server')
project(':titlesystem-client').projectDir = file('titlesystem-client')
project(':velocity-bridge').projectDir = file('velocity-bridge')